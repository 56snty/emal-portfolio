<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>THE_OBJECT // V.FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; cursor: none; }
        body { background:#000; color:#fff; font-family: "Space Mono", monospace; overflow-x:hidden; height: 500vh; }
        #canvas-container { position:fixed; inset:0; z-index:0; pointer-events: none; }
        .hud { position:fixed; inset:0; padding:30px; display:flex; flex-direction:column; justify-content:space-between; z-index:100; pointer-events:none; mix-blend-mode: difference; }
        .hud-top, .hud-bottom { display:flex; justify-content:space-between; font-size:9px; letter-spacing:3px; text-transform:uppercase; }
        .section { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }
        h1 { font-size: clamp(60px, 18vw, 240px); font-weight: 900; letter-spacing: -0.07em; line-height: 0.8; text-align: center; }
        .tag { border: 1px solid #fff; padding: 4px 8px; border-radius: 2px; font-size: 8px; }
        #progress-bar { width: 0%; height: 2px; background: #fff; margin-top: 10px; transition: width 0.1s ease-out; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="hud">
        <div class="hud-top">
            <div>NODE_STATUS // <span id="node-id" class="tag">0x----</span></div>
            <div id="sync-label">STANDALONE</div>
        </div>
        <div class="hud-bottom">
            <div>MORPH_INDEX<div id="progress-bar"></div></div>
            <div style="text-align: right">STABILITY: <span id="stab">100%</span><br><span style="opacity:0.4">IGLOO_ENGINE_V5</span></div>
        </div>
    </div>
    <main>
        <section><h1>VOID</h1></section>
        <section><h1>MERGE</h1></section>
        <section><h1>FRACTAL</h1></section>
        <section><h1>BEYOND</h1></section>
    </main>
<script>
const bc = new BroadcastChannel(IGLOO_SYNC);
const sid = Math.random().toString(16).slice(2, 6).toUpperCase();
document.getElementById(node-id).textContent = sid;

let state = { morph: 0, target: 0 };
bc.onmessage = (e) => {
    state.target = e.data.morph;
    document.getElementById(sync-label).textContent = "LINKED_NODE";
    document.getElementById(sync-label).style.color = "#00ffcc";
};

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById(canvas-container).appendChild(renderer.domElement);

const material = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uMorph: { value: 0 } },
    vertexShader: `
        varying vec3 vNormal;
        uniform float uTime;
        uniform float uMorph;
        void main() {
            vNormal = normal;
            float noise = sin(position.x * 2.0 + uTime) * cos(position.y * 2.0 + uTime) * uMorph;
            vec3 newPos = position + normal * noise;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
        }
    `,
    fragmentShader: `
        varying vec3 vNormal;
        uniform float uMorph;
        void main() {
            vec3 color = mix(vec3(0.05, 0.05, 0.1), vec3(0.9, 0.1, 0.2), uMorph);
            float fresnel = pow(1.0 - dot(vNormal, vec3(0,0,1)), 3.0);
            gl_FragColor = vec4(color + fresnel, 1.0);
        }
    `
});

const geometry = new THREE.IcosahedronGeometry(1.8, window.innerWidth < 768 ? 32 : 64);
const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);
camera.position.z = 5;

const lenis = new Lenis({ lerp: 0.1, touchMultiplier: 2 });
lenis.on(scroll, (e) => {
    state.target = e.progress;
    bc.postMessage({ morph: e.progress });
});

function animate(t) {
    lenis.raf(t);
    state.morph += (state.target - state.morph) * 0.08;
    material.uniforms.uMorph.value = state.morph;
    material.uniforms.uTime.value = t * 0.002;
    document.getElementById(progress-bar).style.width = (state.morph * 100) + "%";
    document.getElementById(stab).textContent = (100 - state.morph * 50).toFixed(0) + "%";
    mesh.rotation.y += 0.005 + (state.morph * 0.02);
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
window.addEventListener(resize, () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
